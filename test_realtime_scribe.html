<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Scribe — Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    h1 { font-size: 1.5rem; font-weight: 700; color: #f8fafc; letter-spacing: -0.02em; }
    h1 span { color: #6366f1; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #1e2130;
      border-radius: 10px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.idle       { background: #475569; }
    .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.connected  { background: #22c55e; }
    .dot.recording  { background: #ef4444; animation: pulse 0.6s infinite; }
    .dot.processing { background: #6366f1; animation: pulse 0.8s infinite; }
    .dot.error      { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .visit-badge {
      display: none;
      font-size: 0.75rem;
      color: #64748b;
      margin-left: auto;
      white-space: nowrap;
    }

    /* Setup section — shown before visit created */
    #setup-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #1e2130;
      border-radius: 12px;
      padding: 20px;
    }

    #setup-section label {
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 4px;
      display: block;
    }

    #setup-section input {
      width: 100%;
      padding: 10px 12px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
    }
    #setup-section input:focus { border-color: #6366f1; }

    .setup-row { display: flex; gap: 12px; }
    .setup-row > div { flex: 1; }

    /* Main session section — hidden until visit created + WS ready */
    #session-section { display: none; flex-direction: column; gap: 24px; }

    .controls { display: flex; gap: 12px; }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    #btn-start-session { background: #6366f1; color: #fff; width: 100%; }
    #btn-record { background: #6366f1; color: #fff; flex: 1; }
    #btn-record.recording { background: #ef4444; }
    #btn-submit { background: #0f766e; color: #fff; flex: 1; }

    .panel { background: #1e2130; border-radius: 12px; overflow: hidden; }

    .panel-header {
      padding: 12px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      border-bottom: 1px solid #2d3148;
    }

    .panel-body {
      padding: 16px;
      min-height: 80px;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .panel-body.empty { color: #3d4466; font-style: italic; }

    #partial-text { color: #6366f1; font-style: italic; }

    #summary-panel .panel-header { color: #34d399; }
    #summary-panel .panel-body   { color: #d1fae5; }

    #log {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.78rem;
      color: #475569;
      max-height: 160px;
      overflow-y: auto;
      line-height: 1.6;
    }
    #log .err  { color: #f87171; }
    #log .ok   { color: #4ade80; }
    #log .info { color: #94a3b8; }
    #log .recv { color: #818cf8; }
  </style>
</head>
<body>
<div class="container">
  <h1>Realtime <span>Scribe</span> — Test UI</h1>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="dot idle" id="status-dot"></div>
    <span id="status-text">Fill in visit details and click Start Session</span>
    <span class="visit-badge" id="visit-badge"></span>
  </div>

  <!-- Step 1: Setup form -->
  <div id="setup-section">
    <div class="setup-row">
      <div>
        <label>Patient ID (optional)</label>
        <input type="text" id="input-patient" placeholder="e.g. patient_001" />
      </div>
      <div>
        <label>Provider ID (optional)</label>
        <input type="text" id="input-provider" placeholder="e.g. dr_smith" />
      </div>
    </div>
    <div>
      <label>Visit Type (optional)</label>
      <input type="text" id="input-visit-type" placeholder="e.g. follow-up, consultation" />
    </div>
    <button id="btn-start-session">🚀 Create Visit &amp; Connect</button>
  </div>

  <!-- Step 2: Recording session -->
  <div id="session-section">
    <div class="controls">
      <button id="btn-record" disabled>🎙 Start Recording</button>
      <button id="btn-submit" disabled>✅ Submit &amp; Summarise</button>
    </div>

    <div class="panel">
      <div class="panel-header">🔴 Live Transcript</div>
      <div class="panel-body empty" id="partial-body">
        <span id="partial-text">Waiting for audio…</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">📝 Full Transcript</div>
      <div class="panel-body empty" id="transcript-body">Transcript will appear here after recording stops.</div>
    </div>

    <div class="panel" id="summary-panel">
      <div class="panel-header">🩺 Clinical Summary</div>
      <div class="panel-body empty" id="summary-body">Summary will appear here after submission.</div>
    </div>
  </div>

  <!-- Log always visible -->
  <div class="panel">
    <div class="panel-header">🔧 Event Log</div>
    <div class="panel-body" style="padding:12px 16px;">
      <div id="log"></div>
    </div>
  </div>
</div>

<script>
  const API_BASE = "http://localhost:8000";
  const WS_BASE  = "ws://localhost:8000";

  let visitId       = null;
  let ws            = null;
  let mediaStream   = null;
  let audioContext  = null;
  let processor     = null;
  let isRecording   = false;
  let committedText = "";

  const dot          = document.getElementById("status-dot");
  const statusText   = document.getElementById("status-text");
  const visitBadge   = document.getElementById("visit-badge");
  const setupSection = document.getElementById("setup-section");
  const sessionSection = document.getElementById("session-section");
  const btnStart     = document.getElementById("btn-start-session");
  const btnRecord    = document.getElementById("btn-record");
  const btnSubmit    = document.getElementById("btn-submit");
  const partialBody  = document.getElementById("partial-body");
  const partialEl    = document.getElementById("partial-text");
  const transcriptEl = document.getElementById("transcript-body");
  const summaryEl    = document.getElementById("summary-body");
  const logEl        = document.getElementById("log");

  function log(msg, cls = "info") {
    const line = document.createElement("div");
    line.className = cls;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setStatus(state, text) {
    dot.className = `dot ${state}`;
    statusText.textContent = text;
  }

  // ── Step 1: Create visit then open WS ──────────────────────────────────────
  btnStart.addEventListener("click", async () => {
    btnStart.disabled = true;
    setStatus("connecting", "Creating visit…");

    const patientId  = document.getElementById("input-patient").value.trim() || null;
    const providerId = document.getElementById("input-provider").value.trim() || null;
    const visitType  = document.getElementById("input-visit-type").value.trim() || null;

    log("Creating visit…");
    try {
      const res = await fetch(`${API_BASE}/api/visits/`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ patient_id: patientId, provider_id: providerId, visit_type: visitType }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      const data = await res.json();
      visitId = data.visit_id;
      visitBadge.textContent = `visit: ${visitId}`;
      visitBadge.style.display = "block";
      log(`Visit created: ${visitId}`, "ok");
    } catch (err) {
      setStatus("error", `Failed to create visit: ${err.message}`);
      log(`Create visit error: ${err.message}`, "err");
      btnStart.disabled = false;
      return;
    }

    openWebSocket();
  });

  // ── Step 2: Open WebSocket ─────────────────────────────────────────────────
  function openWebSocket() {
    setStatus("connecting", "Connecting to server…");
    log(`Opening WebSocket: ${WS_BASE}/api/realtime/${visitId}`);

    ws = new WebSocket(`${WS_BASE}/api/realtime/${visitId}`);

    ws.onopen = () => {
      log("WebSocket open — waiting for ElevenLabs session to start…", "ok");
    };

    ws.onmessage = (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }
      log(`← ${JSON.stringify(msg).slice(0, 140)}`, "recv");

      switch (msg.type) {
        case "ready":
          setStatus("connected", "Connected — ready to record");
          // Show session UI, hide setup form
          setupSection.style.display = "none";
          sessionSection.style.display = "flex";
          btnRecord.disabled = false;
          log("Server ready. Click 'Start Recording'.", "ok");
          break;

        case "partial":
          partialBody.classList.remove("empty");
          partialEl.textContent = msg.text || "";
          break;

        case "transcript_complete":
          committedText = msg.text || "";
          transcriptEl.textContent = committedText;
          transcriptEl.classList.remove("empty");
          partialEl.textContent = "";
          setStatus("connected", "Transcript ready — click Submit");
          btnSubmit.disabled = false;
          log(`Transcript complete (${committedText.length} chars, lang: ${msg.language || "?"})`, "ok");
          break;

        case "summary":
          summaryEl.textContent = msg.text || "";
          summaryEl.classList.remove("empty");
          log(`Summary received (${(msg.text || "").length} chars)`, "ok");
          break;

        case "done":
          setStatus("connected", "Session complete ✓");
          log("Session done.", "ok");
          break;

        case "error":
          setStatus("error", `Error: ${msg.message}`);
          log(`Server error: ${msg.message}`, "err");
          break;
      }
    };

    ws.onerror = () => {
      setStatus("error", "WebSocket error");
      log("WebSocket error", "err");
    };

    ws.onclose = (e) => {
      log(`WebSocket closed (code ${e.code})`, "info");
      if (isRecording) stopRecording();
    };
  }

  // ── Step 3: Record ─────────────────────────────────────────────────────────
  btnRecord.addEventListener("click", async () => {
    if (!isRecording) await startRecording();
    else stopRecording();
  });

  async function startRecording() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (err) {
      log(`Microphone access denied: ${err.message}`, "err");
      return;
    }

    audioContext = new AudioContext({ sampleRate: 16000 });
    const source = audioContext.createMediaStreamSource(mediaStream);
    processor    = audioContext.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = (e) => {
      if (!isRecording || ws?.readyState !== WebSocket.OPEN) return;
      const pcm16 = floatTo16BitPCM(e.inputBuffer.getChannelData(0));
      ws.send(pcm16.buffer);
    };

    source.connect(processor);
    processor.connect(audioContext.destination);

    isRecording = true;
    btnRecord.textContent = "⏹ Stop Recording";
    btnRecord.classList.add("recording");
    btnSubmit.disabled = true;
    committedText = "";
    transcriptEl.textContent = "Transcript will appear here after recording stops.";
    transcriptEl.classList.add("empty");
    summaryEl.textContent = "Summary will appear here after submission.";
    summaryEl.classList.add("empty");
    partialEl.textContent = "Listening…";
    setStatus("recording", "Recording…");
    log("Recording started — streaming PCM 16kHz to server", "ok");
  }

  function stopRecording() {
    if (!isRecording) return;
    isRecording = false;

    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (processor)   { processor.disconnect(); processor = null; }
    if (audioContext){ audioContext.close(); audioContext = null; }

    if (ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "stop" }));
      log("Sent stop — waiting for transcript…");
    }

    btnRecord.textContent = "🎙 Start Recording";
    btnRecord.classList.remove("recording");
    setStatus("processing", "Processing transcript…");
  }

  // ── Step 4: Submit ─────────────────────────────────────────────────────────
  btnSubmit.addEventListener("click", async () => {
    if (!committedText || !visitId) return;

    btnSubmit.disabled = true;
    setStatus("processing", "Generating summary…");
    log(`POST /api/scribe/${visitId}/summarize-transcript`);

    try {
      const res = await fetch(`${API_BASE}/api/scribe/${visitId}/summarize-transcript`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ transcript: committedText }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      const data = await res.json();

      summaryEl.textContent = data.summary_text || "(empty)";
      summaryEl.classList.remove("empty");
      setStatus("connected", "Summary saved ✓");
      log(`Summary saved — summary_id: ${data.summary_id}`, "ok");
    } catch (err) {
      setStatus("error", `Submit failed: ${err.message}`);
      log(`Submit error: ${err.message}`, "err");
      btnSubmit.disabled = false;
    }
  });

  // ── Utility ────────────────────────────────────────────────────────────────
  function floatTo16BitPCM(float32Array) {
    const out = new Int16Array(float32Array.length);
    for (let i = 0; i < float32Array.length; i++) {
      const s = Math.max(-1, Math.min(1, float32Array[i]));
      out[i] = s < 0 ? s * 32768 : s * 32767;
    }
    return out;
  }
</script>
</body>
</html>
